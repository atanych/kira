<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дайджест недвижимости</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #191c1f;
    color: #ffffff;
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 36px 28px;
    width: 700px;
    line-height: 1.5;
    letter-spacing: 0.16px;
    -webkit-font-smoothing: antialiased;
  }

  /* === HEADER === */
  .header {
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: #ffffff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }

  .date-pill {
    display: inline-flex;
    align-items: center;
    padding: 10px 20px;
    border-radius: 9999px;
    background: rgba(244,244,244,0.08);
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.2px;
  }

  .header h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.1;
    color: #ffffff;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 32px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-pill {
    display: inline-flex;
    align-items: center;
    padding: 7px 16px;
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .pill-red {
    background: rgba(226,59,74,0.15);
    color: #e23b4a;
    border: 1.5px solid rgba(226,59,74,0.25);
  }
  .pill-orange {
    background: rgba(236,126,0,0.12);
    color: #ec7e00;
    border: 1.5px solid rgba(236,126,0,0.2);
  }
  .pill-teal {
    background: rgba(0,168,126,0.12);
    color: #00a87e;
    border: 1.5px solid rgba(0,168,126,0.2);
  }
  .pill-blue {
    background: rgba(73,79,223,0.12);
    color: #6b70ff;
    border: 1.5px solid rgba(73,79,223,0.2);
  }

  .section h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #ffffff;
  }

  /* === CARDS === */
  .card {
    background: rgba(244,244,244,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 10px;
  }

  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 8px;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .price-pill {
    display: inline-flex;
    padding: 4px 14px;
    border-radius: 9999px;
    background: rgba(0,168,126,0.12);
    color: #00a87e;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(0,168,126,0.2);
  }

  .card-body {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
    letter-spacing: 0.1px;
  }

  .card-source {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-top: 10px;
    font-weight: 500;
  }

  /* === STATS === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-card {
    background: rgba(244,244,244,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 18px 12px;
    text-align: center;
  }

  .stat-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .stat-value.trend-down { color: #e23b4a; }
  .stat-value.trend-up { color: #00a87e; }

  .stat-label {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    font-weight: 500;
  }

  .stat-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
  }

  /* === INSIGHTS === */
  .insight {
    background: rgba(244,244,244,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-left: 3px solid #494fdf;
    border-radius: 4px 12px 12px 4px;
    padding: 14px 20px;
    margin-bottom: 8px;
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
  }

  /* === USEFUL === */
  .useful-list {
    background: rgba(244,244,244,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 8px 20px;
  }

  .useful-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.55;
  }

  .useful-item:last-child { border-bottom: none; }

  .arrow {
    color: #494fdf;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* === FOOTER === */
  .footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-sources {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
  }

  .footer-brand {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 9999px;
    background: rgba(244,244,244,0.06);
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🏗</div>
      <div class="logo-text">Недвижимость</div>
    </div>
    <div class="date-pill">📅 {{dateRange}}</div>
  </div>
  <h1>Еженедельный<br>дайджест Минска</h1>
</div>

<!-- NEW PROJECTS -->
<div class="section">
  <div class="section-header">
    <span class="section-pill pill-red">Новое</span>
    <h2>Новые проекты / Старт продаж</h2>
  </div>
  {{newProjects}}
</div>

<!-- CONSTRUCTION -->
<div class="section">
  <div class="section-header">
    <span class="section-pill pill-orange">Стройка</span>
    <h2>Ход строительства</h2>
  </div>
  {{construction}}
</div>

<!-- ANALYTICS -->
<div class="section">
  <div class="section-header">
    <span class="section-pill pill-teal">Аналитика</span>
    <h2>Цены и аналитика</h2>
  </div>
  <div class="stats-grid">
    {{stats}}
  </div>
  {{insights}}
</div>

<!-- USEFUL -->
<div class="section">
  <div class="section-header">
    <span class="section-pill pill-blue">Полезное</span>
    <h2>Полезное</h2>
  </div>
  <div class="useful-list">
    {{useful}}
  </div>
</div>

<div class="footer">
  <div class="footer-sources">Источники: {{sources}}</div>
  <div class="footer-brand">⚡ Kira · авто-дайджест</div>
</div>

</body>
</html>
